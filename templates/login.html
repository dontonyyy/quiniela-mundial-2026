{% extends "base.html" %}
{% block content %}
<div class="card login-card">
  <h1>Quiniela del Mundial</h1>
  <p>Ingresa con tu usuario y contraseña</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <input type="text" name="username" placeholder="Tu nombre" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
  </form>
  <p class="alt-link">¿Todavía no tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a></p>
</div>
{% endblock %}
