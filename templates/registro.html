{% extends "base.html" %}
{% block content %}
<div class="card login-card">
  <h1>Regístrate</h1>
  <p>Elige el nombre con el que vas a participar y una contraseña</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <input type="text" name="username" placeholder="Tu nombre" required>
    <input type="password" name="password" placeholder="Contraseña (mínimo 4 caracteres)" required minlength="4">
    <button type="submit">Crear cuenta</button>
  </form>
  <p class="alt-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
</div>
{% endblock %}
